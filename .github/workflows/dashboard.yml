name: Daily Dashboard Refresh

on:
  schedule:
    # Times are UTC. UK summer (BST) = UTC+1; UK winter (GMT) = UTC+0.
    # Multiple cron lines per slot to work around GitHub's unreliable scheduler.
    # Morning slot — aim for 07:30 BST (06:30 UTC):
    - cron: '20 6 * * *'
    - cron: '25 6 * * *'
    - cron: '30 6 * * *'
    # Evening slot — aim for 17:30 BST (16:30 UTC):
    - cron: '20 16 * * *'
    - cron: '25 16 * * *'
    - cron: '30 16 * * *'
  workflow_dispatch:
permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build dashboard
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: python scripts/build_dashboard.py

      - name: Commit and push if changed
        run: |
          git config user.name  "dashboard-bot"
          git config user.email "dashboard-bot@users.noreply.github.com"
          git add dashboards/ index.md README.md
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Dashboard refresh: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          fi
